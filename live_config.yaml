# Live configuration – uses recent data only, same features/model as training

data:
  symbols:
    - BTC/USDT
    - ETH/USDT
    - BNB/USDT
    - SOL/USDT
    - ADA/USDT
    - XRP/USDT
    - DOT/USDT
    - DOGE/USDT
    - AVAX/USDT
    - MATIC/USDT
    - LINK/USDT
    - UNI/USDT
    - ATOM/USDT
    - LTC/USDT
    - BCH/USDT
    - ALGO/USDT
    - NEAR/USDT
    - FIL/USDT
    - ICP/USDT
    - ETC/USDT
    - VET/USDT
    - THETA/USDT
    - XLM/USDT
    - EOS/USDT
    - TRX/USDT
    - FTM/USDT
    - APE/USDT
    - SAND/USDT
    - MANA/USDT
    - AAVE/USDT
    - MKR/USDT
    - CRV/USDT
  start_date: "2025-03-01"      # adjust as needed (must be far enough back)
  end_date: "2026-03-18"        # today's date (update manually)
  exchange: "binance"
  timeframe: "1d"

features:                        # must be identical to training config
  technical_indicators:
    - rsi
    - macd
    - bbands
    - atr
    - garman_klass_vol
    - volume_ratio
    - price_position
    - adx
    - obv
    - stoch_k
  rolling_returns: [1, 5, 21, 63]
  rolling_volatility: [21]
  rolling_correlation: [21]
  macro_indicators:
    benchmark: "BTC/USDT"
    benchmark_returns: [1, 5, 21, 63]
    benchmark_volatility: [21]
    benchmark_sma: [50, 200]
  dollar_volume_rank: true
  top_n_liquid: 25

model:
  type: "ensemble"
  target_horizon: 5
  classification: false
  train_window: 730
  retrain_frequency: 21
  confidence_threshold: 0.0
  use_feature_selection: true
  early_stopping_rounds: 20
  hyperparameters:
    xgboost:
      n_estimators: 1500
      max_depth: 6
      learning_rate: 0.02
      subsample: 0.8
      colsample_bytree: 0.8
      reg_alpha: 0.1
      reg_lambda: 0.1
      tree_method: "hist"
    lightgbm:
      n_estimators: 1500
      max_depth: 6
      learning_rate: 0.02
      subsample: 0.8
      feature_fraction: 0.8
      reg_alpha: 0.1
      reg_lambda: 0.1

portfolio:                         # used for weight calculation in live_predict.py
  top_n: 10
  weight_method: "volatility_targeting"
  max_weight: 0.2
  min_weight: 0.01
  target_volatility: 0.25
  stop_loss: 0.20
  transaction_cost: 0.0015
  rebalance_frequency: "1W"

risk:                              # included for completeness (not used in prediction)
  volatility_scaling: true
  benchmark_for_vol: "BTC/USDT"
  max_market_volatility: 0.80
  min_capital_factor: 0.2
  trend_filter:
    enabled: true
    benchmark: "BTC/USDT"
    sma_period: 300
    capital_multiplier_when_below: 0.1
    capital_multiplier_when_above: 1.0

backtest:                          # not used in live, but kept for structure
  initial_capital: 1000000
  benchmark_symbol: "BTC/USDT"

logging:
  level: "INFO"
  file: "logs/trading.log"

output:                             # <-- ADD THIS SECTION
  plots_dir: "plots"
  results_dir: "results"