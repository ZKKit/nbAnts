  confidence_threshold: 0.0
  device: cpu
  early_stopping_rounds: 48
  hyperparameters:
    lightgbm:
      feature_fraction: 0.2650640588680905
      learning_rate: 0.001124579825911934
      max_depth: 15
      n_estimators: 1200
      reg_alpha: 0.1452824663751603
      reg_lambda: 0.00011526449540315612
      subsample: 0.263
    xgboost:
      colsample_bytree: 0.641
      learning_rate: 0.030405325392865647
      max_depth: 5
      n_estimators: 2300
      reg_alpha: 6.025215736203858e-05
      reg_lambda: 1.951722464144947e-05
      subsample: 0.88
