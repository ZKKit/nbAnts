  benchmark_for_vol: BTC/USDT
  max_market_volatility: 0.4193
  min_capital_factor: 0.0792
  trend_filter:
    benchmark: BTC/USDT
    capital_multiplier_when_above: 1.0
    capital_multiplier_when_below: 0.647
    enabled: true
    sma_period: 191
  volatility_scaling: true
